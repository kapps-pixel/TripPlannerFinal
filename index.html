<!DOCTYPE html>
<html>
<head>
    <title>TripPlanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login" class="box">
    <h1>TripPlanner</h1>
    <p>Enter Your PIN</p>

    <input type="password" id="pinInput">
    <br><br>

    <button onclick="login()">Unlock</button>
</div>

<div id="dashboard" class="box hidden">
    <h1>TripPlanner</h1>
    <div class="button" onclick="showCreate()">+ Add New List</div>
    <div id="tripList"></div>
</div>

<div id="create" class="box hidden">
    <h1>Create a New Trip</h1>

    <input id="country" placeholder="Country">

   <p>Duration:</p>

<div class="duration-group">
    <label><input type="radio" name="duration" value="short"> 1–7 Days</label>
    <label><input type="radio" name="duration" value="medium"> 1–2 Weeks</label>
    <label><input type="radio" name="duration" value="long"> 1 Month+</label>
</div>

    <p>Climate:</p>

<div class="climate-group">
    <label><input type="checkbox" value="hot"> Hot</label>
    <label><input type="checkbox" value="cold"> Cold</label>
    <label><input type="checkbox" value="rainy"> Rainy</label>
    <label><input type="checkbox" value="humid"> Humid</label>
    <label><input type="checkbox" value="dry"> Dry</label>
    <label><input type="checkbox" value="windy"> Windy</label>
    <label><input type="checkbox" value="snowy"> Snowy</label>
    <label><input type="checkbox" value="tropical"> Tropical</label>
</div>

    <p>Activities:</p>
    <input id="activities" placeholder="beach, hiking">

    <br><br>
    <button onclick="createTrip()">Create</button>
    <button onclick="showDashboard()">Back</button>
</div>

<div id="trip" class="box hidden">
    <h1 id="tripTitle"></h1>
    <button onclick="deleteTrip()" style="background:red; color:white;">
    Delete Trip
    </button>
    <div id="items"></div>

    <input id="newItem" placeholder="Add item">
    <button onclick="addItem()">Add</button>

    <br><br>
    <button onclick="showDashboard()">Back</button>
</div>

<script src="script.js"></script>
</body>
</html>
